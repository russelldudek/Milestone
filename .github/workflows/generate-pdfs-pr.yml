name: Generate candidate PDFs on PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Restore committed brand assets
        run: |
          if [ -f .asset-payload/brand-assets.zip.b64 ]; then
            base64 --decode .asset-payload/brand-assets.zip.b64 > /tmp/brand-assets.zip
            unzip -o /tmp/brand-assets.zip -d .
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF renderer
        run: |
          python -m pip install --upgrade pip
          python -m pip install weasyprint pillow pypdf

      - name: Generate and validate PDFs
        run: python scripts/build_artifacts.py

      - name: Commit generated PDF binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/brand docs
          if git diff --cached --quiet; then
            echo "PDF binaries already current."
          else
            git commit -m "Generate downloadable candidate PDFs [generated]"
            git push origin HEAD:${{ github.head_ref }}
          fi
