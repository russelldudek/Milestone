name: Build and publish candidate campaign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[generated]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Restore committed brand assets
        run: |
          if [ -f .asset-payload/brand-assets.zip.b64 ]; then
            base64 --decode .asset-payload/brand-assets.zip.b64 > /tmp/brand-assets.zip
            unzip -o /tmp/brand-assets.zip -d .
            rm -rf .asset-payload
          fi

      - name: Apply and verify executive masthead
        run: |
          python scripts/apply_masthead.py
          python scripts/verify_masthead.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install renderer
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q weasyprint pillow pypdf

      - name: Generate and validate campaign artifacts
        run: python scripts/build_artifacts.py

      - name: Commit generated campaign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Campaign artifacts already current."
          else
            git commit -m "Generate verified campaign artifacts [generated]"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
