name: Build campaign artifacts

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/brand/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install renderer
        run: |
          python -m pip install --upgrade pip
          python -m pip install weasyprint pillow pypdf
      - name: Generate and validate artifacts
        run: python scripts/build_artifacts.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/brand docs
          if git diff --cached --quiet; then
            echo "Generated artifacts already current."
          else
            git commit -m "Generate campaign assets and PDFs [generated]"
            git push origin main
          fi
